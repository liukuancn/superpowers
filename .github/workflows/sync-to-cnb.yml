name: Sync to CNB

on:
  push:
    branches: [main, master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to CNB
        run: |
          git remote add cnb https://cnb:${CNB_TOKEN}@cnb.cool/github-fork/github-fork/superpowers.git
          git push cnb --mirror
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
